<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor de Nota Fiscal - Inteligente</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tesseract.js (Local) -->
    <script src="./js/tesseract/tesseract.min.js"></script>
    <style>
:root {
    --bg-color: #0f172a; /* Slate 900 */
    --surface-color: #1e293b; /* Slate 800 */
    --surface-color-light: #334155; /* Slate 700 */
    --primary-color: #3b82f6; /* Blue 500 */
    --primary-hover: #2563eb; /* Blue 600 */
    --text-primary: #f8fafc; /* Slate 50 */
    --text-secondary: #94a3b8; /* Slate 400 */
    --border-color: #334155;
    
    --border-radius: 16px;
    --border-radius-sm: 8px;
    --transition-speed: 0.3s;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body {
    background-color: var(--bg-color);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.app-container {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    background-color: var(--surface-color);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
}

@media (min-width: 481px) {
    .app-container {
        min-height: 850px;
        border-radius: var(--border-radius);
        margin: 20px 0;
    }
}

header {
    padding: 24px;
    text-align: center;
    border-bottom: 1px solid var(--border-color);
}

header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

header p {
    font-size: 0.875rem;
    color: var(--text-secondary);
}

main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px;
    gap: 24px;
}

.scanner-container {
    position: relative;
    width: 100%;
    aspect-ratio: 3/4;
    border-radius: var(--border-radius);
    overflow: hidden;
    background-color: #000;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
    border: 1px solid var(--border-color);
}

.video-wrapper {
    width: 100%;
    height: 100%;
    position: relative;
}

#camera-feed {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.scan-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        linear-gradient(to right, rgba(59, 130, 246, 0.5) 2px, transparent 2px) 0 0,
        linear-gradient(to right, rgba(59, 130, 246, 0.5) 2px, transparent 2px) 100% 0,
        linear-gradient(to bottom, rgba(59, 130, 246, 0.5) 2px, transparent 2px) 0 0,
        linear-gradient(to bottom, rgba(59, 130, 246, 0.5) 2px, transparent 2px) 0 100%;
    background-repeat: no-repeat;
    background-size: 40px 40px;
    z-index: 10;
    box-shadow: inset 0 0 0 4000px rgba(0, 0, 0, 0.4); /* Dim outside */
    clip-path: polygon(
        0% 0%, 0% 100%, 10% 100%, 10% 10%, 90% 10%, 90% 90%, 10% 90%, 10% 100%, 100% 100%, 100% 0%
    ); /* Creates a clear window in the middle */
}

/* Optional: scanning animation line */
.scan-overlay::after {
    content: '';
    position: absolute;
    top: 10%;
    left: 10%;
    width: 80%;
    height: 2px;
    background-color: var(--primary-color);
    box-shadow: 0 0 10px var(--primary-color);
    animation: scanLine 2s infinite linear;
}

@keyframes scanLine {
    0% { top: 10%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { top: 90%; opacity: 0; }
}


.controls {
    display: flex;
    justify-content: center;
    margin-top: auto;
}

.primary-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 16px;
    background-color: var(--primary-color);
    color: white;
    border: none;
    border-radius: var(--border-radius-sm);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background-color var(--transition-speed), transform 0.1s;
    box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.5);
}

.primary-btn:hover {
    background-color: var(--primary-hover);
}

.primary-btn:active {
    transform: scale(0.98);
}

.secondary-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 14px;
    background-color: transparent;
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    border-radius: var(--border-radius-sm);
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: background-color var(--transition-speed);
}

.secondary-btn:hover {
    background-color: var(--surface-color-light);
}

.loading-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(8px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
}

.spinner {
    width: 50px;
    height: 50px;
    border: 4px solid var(--surface-color-light);
    border-top-color: var(--primary-color);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 16px;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.progress-bar-container {
    width: 80%;
    max-width: 250px;
    height: 6px;
    background-color: var(--surface-color-light);
    border-radius: 3px;
    margin-top: 16px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background-color: var(--primary-color);
    transition: width 0.3s ease;
}

.results-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: var(--surface-color);
    z-index: 40;
    display: flex;
    flex-direction: column;
    padding: 24px;
    animation: slideUp 0.3s ease-out forwards;
}

@keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
}

.results-container h2 {
    font-size: 1.25rem;
    margin-bottom: 16px;
    color: var(--primary-color);
}

.result-box {
    flex: 1;
    background-color: var(--bg-color);
    border: 1px solid var(--border-color);
    border-radius: var(--border-radius-sm);
    padding: 16px;
    margin-bottom: 24px;
}

#extracted-text {
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    color: var(--text-primary);
    font-size: 0.875rem;
    line-height: 1.5;
    resize: none;
    outline: none;
}

.hidden {
    display: none !important;
}
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Scan receipt</h1>
            <p>Posicione a nota fiscal e capture para ler</p>
        </header>

        <main>
            <div class="scanner-container">
                <div class="video-wrapper">
                    <video id="camera-feed" autoplay playsinline></video>
                    <div class="scan-overlay"></div>
                </div>
                
                <canvas id="snapshot-canvas" style="display: none;"></canvas>
            </div>

            <div class="controls">
                <button id="capture-btn" class="primary-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    Capturar Nota
                </button>
            </div>

            <div id="loading-indicator" class="loading-container hidden">
                <div class="spinner"></div>
                <p id="loading-text">Analisando imagem...</p>
                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>

            <div id="results-container" class="results-container hidden">
                <h2>Texto Extraído</h2>
                <div class="result-box">
                    <textarea id="extracted-text" readonly></textarea>
                </div>
                <button id="scan-again-btn" class="secondary-btn">Escanear Novamente</button>
            </div>
        </main>
    </div>

    <script>
document.addEventListener('DOMContentLoaded', () => {
    const video = document.getElementById('camera-feed');
    const canvas = document.getElementById('snapshot-canvas');
    const captureBtn = document.getElementById('capture-btn');
    const loadingIndicator = document.getElementById('loading-indicator');
    const loadingText = document.getElementById('loading-text');
    const progressBar = document.getElementById('progress-bar');
    const resultsContainer = document.getElementById('results-container');
    const extractedText = document.getElementById('extracted-text');
    const scanAgainBtn = document.getElementById('scan-again-btn');

    let stream = null;

    // Initialize Camera
    async function startCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: 'environment', // Prefer back camera
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                }
            });
            video.srcObject = stream;
        } catch (err) {
            console.error('Erro ao acessar a câmera:', err);
            alert('Não foi possível acessar a câmera. Por favor, permita o acesso e tente novamente.');
        }
    }

    // Stop Camera
    function stopCamera() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
        }
    }

    // Process Image with Tesseract.js
    async function processImage(imageDataUrl) {
        showLoading(true);
        loadingText.textContent = 'Inicializando OCR...';
        progressBar.style.width = '0%';

        try {
            const worker = await Tesseract.createWorker('por', 1, {
                workerPath: './js/tesseract/worker.min.js',
                langPath: './js/tesseract',
                corePath: './js/tesseract/tesseract-core.wasm.js',
                logger: m => {
                    console.log(m);
                    if (m.status === 'recognizing text') {
                        progressBar.style.width = `${Math.round(m.progress * 100)}%`;
                        loadingText.textContent = `Lendo texto... ${Math.round(m.progress * 100)}%`;
                    }
                }
            });

            loadingText.textContent = 'Processando imagem...';
            
            const { data: { text } } = await worker.recognize(imageDataUrl);
            
            await worker.terminate();

            // Display Results
            extractedText.value = text.trim() || 'Nenhum texto foi encontrado na imagem.';
            showLoading(false);
            resultsContainer.classList.remove('hidden');

        } catch (error) {
            console.error('Erro no OCR:', error);
            alert('Ocorreu um erro ao tentar ler a imagem.');
            showLoading(false);
        }
    }

    // Capture Image Action
    captureBtn.addEventListener('click', () => {
        if (!video.videoWidth) return;

        // Set canvas dimensions to match video
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        const context = canvas.getContext('2d');
        // Draw the current video frame onto the canvas
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Get the image data URL (JPEG format)
        const imageDataUrl = canvas.toDataURL('image/jpeg', 0.8);
        
        // Process it
        processImage(imageDataUrl);
    });

    // Reset to scan again
    scanAgainBtn.addEventListener('click', () => {
        resultsContainer.classList.add('hidden');
        extractedText.value = '';
    });

    // UI Helpers
    function showLoading(show) {
        if (show) {
            loadingIndicator.classList.remove('hidden');
        } else {
            loadingIndicator.classList.add('hidden');
        }
    }

    // Start
    startCamera();
});
    </script>
</body>
</html>
